font_family JetBrainsMono Nerd Font
font_size 16.0
bold_font auto
italic_font auto
bold_italic_font auto

background_opacity 0.7
background_blur 32
confirm_os_window_close 0
hide_window_decorations yes

# change to x11 or wayland or leave auto
linux_display_server auto

scrollback_lines 2000
wheel_scroll_min_lines 1

enable_audio_bell no

window_padding_width 4

# Tab bar configuration
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground   #000
active_tab_background   #eee
active_tab_font_style   bold-italic
inactive_tab_foreground #444
inactive_tab_background #999
inactive_tab_font_style normal

# Ghostty-style leader keybinds (Super+B)
map super+b>c new_tab_with_cwd
map super+b>x close_tab
map super+b>1 goto_tab 1
map super+b>2 goto_tab 2
map super+b>3 goto_tab 3
map super+b>4 goto_tab 4
map super+b>5 goto_tab 5
map super+b>6 goto_tab 6
map super+b>7 goto_tab 7
map super+b>8 goto_tab 8
map super+b>9 goto_tab 9
map super+b>n new_os_window_with_cwd

# Splitting shortcuts from Ghostty
map super+b>\ launch --location=vsplit --cwd=current
map super+b>- launch --location=hsplit --cwd=current
map super+b>h neighboring_window left
map super+b>j neighboring_window down
map super+b>k neighboring_window up
map super+b>l neighboring_window right

selection_foreground none
selection_background none

foreground #dddddd
background #000000
cursor #dddddd




# Enable custom mouse right-click menu behavior

map button3 sh -c ~/.local/bin/kitty_context_menu.sh

